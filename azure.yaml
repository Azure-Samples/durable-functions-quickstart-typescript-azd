# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: durable-functions-quickstart-typescript-azd
metadata:
  template: durable-functions-quickstart-typescript-azd@1.0.0
services:
  api:
    project: ./src/
    language: js
    host: function
    remoteBuild: false
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/postprovision.ps1
    posix:
      shell: sh
      run: ./scripts/postprovision.sh
